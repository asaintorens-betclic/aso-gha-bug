name: "Fake Deploy Error"

on:
  workflow_call:
    inputs:
      units:
        required: true
        type: string
      withBug:
        required: false
        type: boolean
        default: true

jobs:
  validate-units:
    name: "Validate units"
    runs-on: ubuntu-latest
    outputs:
      units: ${{ inputs.units }}
    steps:
      - run: echo "OK"

  step-1:
    name: "Step 1 - ${{ matrix.unit.name }}"
    runs-on: ubuntu-latest
    needs: [validate-units]
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.validate-units.outputs.units) }}
    steps:
      - run: |
          if [ "${{ inputs.withBug }}" == "true" ] && [ "${{ matrix.unit.name }}" == "unit-B" ]; then
            echo "KO"
            exit 1
          fi
          echo "OK"

  step-1a-approval:
    name: "Step 1a - Approval"
    runs-on: ubuntu-latest
    needs: [validate-units, step-1]
    if: |
      !cancelled() &&
      needs.validate-units.result == 'success' &&
      needs.step-1.result == 'success'
    environment: production
    steps:
      - run: echo "Approved"

  step-1b-init:
    name: "Step 1b - Init (nested reusable)"
    needs: [validate-units, step-1, step-1a-approval]
    if: |
      !cancelled() &&
      needs.validate-units.result == 'success' &&
      needs.step-1.result == 'success' &&
      needs.step-1a-approval.result == 'success'
    uses: ./.github/workflows/fake-initialize.yml

  step-2:
    name: "Step 2 - ${{ matrix.unit.name }}"
    runs-on: ${{ matrix.unit.runner }}
    needs: [validate-units, step-1, step-1a-approval, step-1b-init]
    if: |
      !cancelled() &&
      needs.validate-units.result == 'success' &&
      needs.step-1.result == 'success' &&
      (needs.step-1a-approval.result == 'success' || needs.step-1a-approval.result == 'skipped') &&
      (needs.step-1b-init.result == 'success' || needs.step-1b-init.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(needs.validate-units.outputs.units) }}
    outputs:
      units: ${{ needs.validate-units.outputs.units }}
    steps:
      - run: echo "OK"

  step-3-validate:
    name: "Step 3 - Validate (the bug surface)"
    runs-on: ubuntu-latest
    needs: [step-2, step-1b-init]
    if: |
      !cancelled() &&
      needs.step-2.result == 'success' &&
      (needs.step-1b-init.result == 'success' || needs.step-1b-init.result == 'skipped')
    steps:
      - name: Check deployment statuses
        run: |
          echo "🐛 IF THIS RUNS WHEN STEP-2 WAS SKIPPED, BUG IS REPRODUCED"
          echo "Units from needs.step-2.outputs.units: ${{ needs.step-2.outputs.units }}"

  step-4-finalize:
    name: "Step 4 - Finalize (sends notif)"
    needs: [step-1b-init, step-3-validate]
    if: |
      !cancelled() &&
      needs.step-3-validate.result == 'success' &&
      (needs.step-1b-init.result == 'success' || needs.step-1b-init.result == 'skipped')
    uses: ./.github/workflows/fake-finalize.yml
