name: "Fake Deploy Error"

on:
  workflow_call:
    inputs:
      units:
        required: true
        type: string
      withBug:
        required: false
        type: boolean
        default: true

jobs:
  step-1:
    name: "Step 1 - ${{ matrix.unit.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(inputs.units) }}
    steps:
      - run: |
          if [ "${{ inputs.withBug }}" == "true" ] && [ "${{ matrix.unit.name }}" == "unit-B" ]; then
            echo "KO"
            exit 1
          fi
          echo "OK"

  step-1a-approval:
    name: "Step 1a - Approval"
    runs-on: ubuntu-latest
    needs: [step-1]
    if: |
      !cancelled() &&
      needs.step-1.result == 'success'
    environment: production
    steps:
      - run: echo "Approved"

  step-1b-init:
    name: "Step 1b - Init (nested reusable)"
    needs: [step-1, step-1a-approval]
    if: |
      !cancelled() &&
      needs.step-1.result == 'success' &&
      needs.step-1a-approval.result == 'success'
    uses: ./.github/workflows/fake-initialize.yml

  step-2:
    name: "Step 2 - ${{ matrix.unit.name }}"
    runs-on: ${{ matrix.unit.runner }}
    needs: [step-1, step-1a-approval, step-1b-init]
    if: |
      !cancelled() &&
      needs.step-1.result == 'success' &&
      (needs.step-1a-approval.result == 'success' || needs.step-1a-approval.result == 'skipped') &&
      (needs.step-1b-init.result == 'success' || needs.step-1b-init.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        unit: ${{ fromJson(inputs.units) }}
    steps:
      - run: echo "OK"

  step-3:
    name: "Step 3 - Notify"
    needs: [step-2, step-1b-init]
    if: |
      !cancelled() &&
      needs.step-2.result == 'success' &&
      (needs.step-1b-init.result == 'success' || needs.step-1b-init.result == 'skipped')
    uses: ./.github/workflows/fake-finalize.yml
